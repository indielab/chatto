name: ci

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  test-frontend-unit:
    runs-on: ubicloud-standard-4
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright dependencies
        run: cd frontend && pnpm exec playwright install chromium --with-deps
        timeout-minutes: 5

      - name: Run frontend typecheck
        run: cd frontend && pnpm check

      - name: Run frontend lint
        run: cd frontend && pnpm lint

      - name: Run frontend unit tests
        run: cd frontend && pnpm vitest --run

  test-cli:
    runs-on: ubicloud-standard-4
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Build frontend
        run: mise build-frontend

      - name: Run Go tests
        run: cd cli && go test -tags test_endpoints ./...

  test-e2e:
    runs-on: ubicloud-standard-4
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-ffmpeg: "true"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright dependencies
        run: cd frontend && pnpm exec playwright install chromium --with-deps
        timeout-minutes: 5

      - name: Build E2E server
        run: mise build-e2e-server

      - name: Run E2E tests
        run: cd frontend && pnpm exec playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  build-main-images:
    needs: [test-cli, test-e2e, test-frontend-unit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubicloud-standard-4
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend assets for CLI image
        run: mise build-frontend

      - name: Prepare CLI Docker contexts
        run: |
          set -euo pipefail

          for arch in amd64 arm64; do
            context="/tmp/chatto-docker/linux-${arch}"
            mkdir -p "$context"
            cp Dockerfile.goreleaser "$context/Dockerfile"
            cp docker-entrypoint.sh "$context/docker-entrypoint.sh"

            (
              cd cli
              CGO_ENABLED=0 GOOS=linux GOARCH="$arch" go build -ldflags="-s -w" -o "$context/chatto" .
            )
          done

      - name: Build and push Chatto image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: /tmp/chatto-docker/linux-amd64
          file: /tmp/chatto-docker/linux-amd64/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/chattocorp/chatto:${{ github.sha }}-amd64
          cache-from: type=gha,scope=chatto-main-amd64
          cache-to: type=gha,mode=max,scope=chatto-main-amd64
          labels: |
            org.opencontainers.image.source=https://github.com/chattocorp/chatto
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.sha }}

      - name: Build and push Chatto image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: /tmp/chatto-docker/linux-arm64
          file: /tmp/chatto-docker/linux-arm64/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ghcr.io/chattocorp/chatto:${{ github.sha }}-arm64
          cache-from: type=gha,scope=chatto-main-arm64
          cache-to: type=gha,mode=max,scope=chatto-main-arm64
          labels: |
            org.opencontainers.image.source=https://github.com/chattocorp/chatto
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.sha }}

      - name: Create Chatto image manifest
        run: |
          docker buildx imagetools create \
            -t "ghcr.io/chattocorp/chatto:${GITHUB_SHA}" \
            "ghcr.io/chattocorp/chatto:${GITHUB_SHA}-amd64" \
            "ghcr.io/chattocorp/chatto:${GITHUB_SHA}-arm64"

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/chattocorp/chatto-client:${{ github.sha }}
          cache-from: type=gha,scope=chatto-client-main
          cache-to: type=gha,mode=max,scope=chatto-client-main
          labels: |
            org.opencontainers.image.source=https://github.com/chattocorp/chatto
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.sha }}

  release:
    needs: [test-cli, test-e2e, test-frontend-unit]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubicloud-standard-4
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # needed by GoReleaser to create changelog
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Use a PAT so the release is authored by a user account rather
          # than github-actions[bot]. Bot-authored releases don't get
          # GitHub's autolink rendering for commit SHAs and #NNN PR refs.
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build frontend Docker tags
        id: frontend_tags
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/chattocorp/chatto-client:${{ steps.version.outputs.version }}"
            if [[ "${{ steps.version.outputs.version }}" == *-* ]]; then
              echo "ghcr.io/chattocorp/chatto-client:next"
            else
              echo "ghcr.io/chattocorp/chatto-client:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.frontend_tags.outputs.tags }}
