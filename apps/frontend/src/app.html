<!doctype html>
<html lang="en-GB" dir="ltr" style="color-scheme: light">
  <head>
    <meta charset="utf-8" />
    <script>
      // Resolve and apply shell preferences as early as possible — before CSS
      // loads — so:
      //   1. The active token set is in place by first paint (no FOUC).
      //   2. The client-side Display setting works before SvelteKit hydrates.
      (() => {
        const root = document.documentElement;
        const mq = window.matchMedia('(prefers-color-scheme: dark)');

        function storedPreferenceTheme() {
          try {
            const raw = localStorage.getItem('chatto:preferences');
            if (!raw) return null;
            const parsed = JSON.parse(raw);
            const theme = parsed && typeof parsed === 'object' ? parsed.displayTheme : null;
            return theme === 'system' || theme === 'light' || theme === 'dark' ? theme : null;
          } catch {
            return null;
          }
        }

        function legacyTheme() {
          try {
            const theme = localStorage.getItem('theme');
            return theme === 'light' || theme === 'dark' ? theme : null;
          } catch {
            return null;
          }
        }

        function applyTheme() {
          const stored = storedPreferenceTheme() ?? legacyTheme() ?? 'system';
          const effective =
            stored === 'light' || stored === 'dark' ? stored : mq.matches ? 'dark' : 'light';
          root.dataset.theme = effective;
          // Pre-CSS background hint, mirrors --color-background.
          root.style.backgroundColor = effective === 'dark' ? '#171717' : '#f3f4f6';
          root.style.colorScheme = effective;
        }

        function applyLocale() {
          const locales = [
            'en-GB',
            'en-US',
            'de-DE',
            'de-AT',
            'de-CH',
            'nl-NL',
            'nl-BE',
            'sv-SE',
            'fr-FR',
            'fr-CA',
            'es-ES',
            'es-419',
            'pt-BR',
            'pt-PT',
            'nb-NO',
            'pl-PL',
            'uk-UA',
            'ja-JP',
            'eo'
          ];
          const legacyLocales = { en: 'en-GB', de: 'de-DE' };
          const defaultLocales = {
            en: 'en-GB',
            de: 'de-DE',
            nl: 'nl-NL',
            sv: 'sv-SE',
            fr: 'fr-FR',
            es: 'es-ES',
            pt: 'pt-BR',
            nb: 'nb-NO',
            no: 'nb-NO',
            pl: 'pl-PL',
            uk: 'uk-UA',
            ja: 'ja-JP',
            eo: 'eo'
          };
          const storedValue = localStorage.getItem('PARAGLIDE_LOCALE');
          const migratedStored = legacyLocales[storedValue] ?? storedValue;
          const stored = locales.includes(migratedStored) ? migratedStored : null;
          if (storedValue && stored && stored !== storedValue) {
            localStorage.setItem('PARAGLIDE_LOCALE', stored);
          }
          const browserLanguages =
            typeof navigator === 'undefined' ? [] : navigator.languages || [navigator.language];
          const requested = stored ? [stored] : browserLanguages;
          const locale =
            requested
              .filter(Boolean)
              .map((value) => String(value).toLowerCase())
              .map((value) => {
                const exact = locales.find((locale) => value === locale.toLowerCase());
                if (exact) return exact;
                const language = value.split('-')[0];
                return defaultLocales[language];
              })
              .find(Boolean) ?? 'en-GB';

          // Paraglide reads this before hydration. Persist browser negotiation so
          // its runtime locale cannot disagree with the first-paint language.
          if (!stored) localStorage.setItem('PARAGLIDE_LOCALE', locale);
          root.lang = locale;
          root.dir = 'ltr';
        }

        applyTheme();
        applyLocale();

        mq.addEventListener('change', () => {
          if ((storedPreferenceTheme() ?? legacyTheme() ?? 'system') === 'system') applyTheme();
        });
      })();
    </script>
    <!-- OG_META_PLACEHOLDER -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="description" content="Real-time chat application" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#e5e7eb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#262626" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon" sizes="32x32" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon" />
    %sveltekit.head%
  </head>
  <body>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
